name: Build and Push Jotta-CLI
on:
  schedule:
    - cron: '0 0 * * 0' # Weekly auto-update
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This step fixes your error by forcing everything to lowercase
      - name: Prepare Lowercase Image Name
        run: |
          IMAGE_PATH="ghcr.io/${{ github.repository }}"
          echo "IMAGE_ID=$(echo $IMAGE_PATH | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push
        run: |
          docker build -t "${{ env.IMAGE_ID }}:latest" .
          docker push "${{ env.IMAGE_ID }}:latest"
