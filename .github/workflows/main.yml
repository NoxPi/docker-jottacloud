name: Build and Push Jotta-CLI
on:
  schedule:
    - cron: '0 0 * * 0' # Weekly auto-update
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase the repo name and owner
        run: |
          echo "IMAGE_ID=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push
        run: |
          docker build -t ${{ env.IMAGE_ID }}:latest .
          docker push ${{ env.IMAGE_ID }}:latest
