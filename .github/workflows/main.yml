name: Build and Push Jotta-CLI
on:
  schedule:
    - cron: '0 0 * * 0' # Weekly auto-update
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This step fixes your error by forcing everything to lowercase
      - name: Prepare Lowercase Image Name
        run: |
          IMAGE_PATH="ghcr.io/${{ github.repository }}"
          echo "IMAGE_ID=$(echo $IMAGE_PATH | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_ID }}:latest
          # This helps GitHub link the package to your repo UI
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
